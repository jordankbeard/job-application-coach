name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for OIDC login — no client secrets needed.
permissions:
  id-token: write
  contents: read
  checks: write      # allows the test reporter to annotate PRs

env:
  DOTNET_VERSION: '8.0.x'
  FUNCTIONS_PROJECT: 'src/JobApplicationCoach.Functions/JobApplicationCoach.Functions.csproj'

jobs:
  # ── CI ─────────────────────────────────────────────────────────────────────
  # Runs on every push and every PR. A failing test blocks a PR merge when
  # branch protection is enabled (Settings → Branches → require status check).
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test --no-build --configuration Release
          --logger "trx;LogFileName=results.trx"
          --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit results
          path: ./test-results/*.trx
          reporter: dotnet-trx

  # ── CD ─────────────────────────────────────────────────────────────────────
  # Runs only when a commit lands on main (not on PRs).
  # Depends on build-and-test so a broken build never deploys.
  deploy:
    name: Deploy to Azure
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: Dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: >
          dotnet publish ${{ env.FUNCTIONS_PROJECT }}
          --configuration Release
          --output ./publish

      - name: Login to Azure (OIDC — no secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: './publish'
