name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: Restore
        run: dotnet restore JobApplicationCoach.sln

      - name: Build
        run: dotnet build JobApplicationCoach.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test JobApplicationCoach.sln
          --no-build
          --configuration Release
          --logger trx
          --results-directory ./test-results

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: ./test-results/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false
